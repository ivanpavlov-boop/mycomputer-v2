server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location @frontend {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = / {
        try_files $uri @frontend;
    }

    location = /en {
        try_files $uri @frontend;
    }

    location = /en/ {
        absolute_redirect off;
        return 308 /en$is_args$args;
    }

    location = /catalog {
        try_files $uri @frontend;
    }

    location = /catalog/ {
        try_files $uri @frontend;
    }

    location = /en/catalog {
        try_files $uri @frontend;
    }

    location = /en/catalog/ {
        try_files $uri @frontend;
    }

    location = /categories {
        try_files $uri @frontend;
    }

    location = /categories/ {
        try_files $uri @frontend;
    }

    location = /en/categories {
        try_files $uri @frontend;
    }

    location = /en/categories/ {
        try_files $uri @frontend;
    }

    location ^~ /c/ {
        try_files $uri @frontend;
    }

    location ^~ /p/ {
        try_files $uri @frontend;
    }

    location ^~ /en/c/ {
        try_files $uri @frontend;
    }

    location ^~ /en/p/ {
        try_files $uri @frontend;
    }

    location ^~ /_nuxt/ {
        try_files $uri @frontend;
        access_log off;
        expires 30d;
    }

    location ^~ /_ipx/ {
        try_files $uri @frontend;
        access_log off;
        expires 30d;
    }

    location = /cart { return 404; }
    location ^~ /cart/ { return 404; }
    location = /checkout { return 404; }
    location ^~ /checkout/ { return 404; }
    location = /account { return 404; }
    location ^~ /account/ { return 404; }
    location = /login { return 404; }
    location = /register { return 404; }
    location = /forgot-password { return 404; }
    location = /reset-password { return 404; }
    location = /wishlist { return 404; }
    location ^~ /wishlist/ { return 404; }
    location = /compare { return 404; }
    location ^~ /compare/ { return 404; }

    location ^~ /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /vendor/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /build/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(?:env|log|sql|sqlite|bak)$ {
        deny all;
    }
}
