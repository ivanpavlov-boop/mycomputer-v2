services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_CONNECTION: default
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      MEILISEARCH_HOST: http://meilisearch:7700
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "php -m | grep -q redis && php artisan redis:health --quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - ./public:/var/www/html/public:ro
      - app-storage:/var/www/html/storage:ro
      - ./deploy/nginx/mycomputer.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-/api/v1}
      NUXT_API_SERVER_BASE_URL: ${NUXT_API_SERVER_BASE_URL:-http://nginx/api/v1}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:8080}
    expose:
      - "3000"

  queue:
    build:
      context: .
    command: sh -c "until php artisan migrate:status --no-interaction >/dev/null 2>&1; do echo 'Waiting for database migrations before queue worker starts...'; sleep 10; done; php artisan queue:work redis --queue=default,emails,loyalty,imports,exports,sync,analytics,search,erp --sleep=3 --tries=3 --timeout=1200"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_CONNECTION: default
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      MEILISEARCH_HOST: http://meilisearch:7700
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage

  scheduler:
    build:
      context: .
    command: sh -c "until php artisan migrate:status --no-interaction >/dev/null 2>&1; do echo 'Waiting for database migrations before scheduler starts...'; sleep 10; done; while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_CONNECTION: default
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      MEILISEARCH_HOST: http://meilisearch:7700
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mycomputer_v2}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  meilisearch:
    build:
      context: ./deploy/meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILISEARCH_KEY:-local-meili-key}"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  app-storage:
  mysql-data:
  redis-data:
  meili-data:
