name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: mycomputer_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, mbstring, pdo_mysql, pcntl, redis, zip
          coverage: none

      - uses: ramsey/composer-install@v3

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: mycomputer_test
          DB_USERNAME: root
          DB_PASSWORD: root
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SCOUT_DRIVER: database

      - name: Pint
        run: vendor/bin/pint --test

      - name: Tests
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: mycomputer_test
          DB_USERNAME: root
          DB_PASSWORD: root
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SCOUT_DRIVER: database

  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and validate frontend
        run: |
          npm ci
          npm run build
